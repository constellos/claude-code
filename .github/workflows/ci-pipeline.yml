name: CI

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  CI:
    uses: constellos/.github/.github/workflows/ci-pipeline-reusable.yml@main
    with:
      node_version: '22'
    secrets: inherit
